apiVersion: apps/v1
kind: Deployment
metadata:
  name: scheduler-service
  labels:
    app: scheduler-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: scheduler-service
  template:
    metadata:
      labels:
        app: scheduler-service
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: scheduler
          image: orchestrator/scheduler-service:latest
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: orchestrator-secrets
                  key: datasource-url
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: orchestrator-secrets
                  key: datasource-password
            - name: SPRING_DATA_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: orchestrator-secrets
                  key: redis-password
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: kafka:9092
            - name: APP_SECURITY_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: orchestrator-secrets
                  key: jwt-secret
            - name: APP_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: orchestrator-secrets
                  key: encryption-key
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: scheduler-service
spec:
  selector:
    app: scheduler-service
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
